version: "3.9"

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: cricketiq-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cricketiq
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: cricketiq-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      PORT:         5000
      MONGODB_URI:  mongodb://mongo:27017/cricketiq
      ML_API_URL:   http://ml-service:8000
      CORS_ORIGIN:  "*"
    volumes:
      - ./backend/data:/app/data:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Python ML Service ─────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml
      dockerfile: ../docker/Dockerfile.ml
    container_name: cricketiq-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ml:/app:ro
      - ./backend/data:/app/backend/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cricketiq-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cricketiq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ml-service

volumes:
  mongo_data:
