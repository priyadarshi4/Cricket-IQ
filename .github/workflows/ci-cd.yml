name: CricketIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Test backend ─────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node -e "const s=require('./server'); console.log('✅ Server loads OK')"
        env:
          NODE_ENV: test
          PORT: 5001

  # ── Test ML service ──────────────────────────────────────────────────────
  test-ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r api/requirements.txt
      - run: python -c "from api.main import app; print('✅ FastAPI app loads OK')"
      - name: Validate training script syntax
        run: python -m py_compile train_model.py && echo "✅ train_model.py syntax OK"

  # ── Build frontend ───────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          REACT_APP_API_URL: https://cricketiq-backend.onrender.com
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7

  # ── Docker build ─────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-ml, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cricketiq-backend:latest
      - name: Build & push ML service
        uses: docker/build-push-action@v5
        with:
          context: ./ml
          file: ./docker/Dockerfile.ml
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cricketiq-ml:latest

  # ── Deploy to Render ──────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy (backend)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
      - name: Trigger Vercel deploy (frontend)
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
